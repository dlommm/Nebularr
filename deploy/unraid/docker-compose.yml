# Nebularr stack for Unraid (Compose Manager / docker compose).
#
# --- Host paths (defaults below) ---
# Default base: /mnt/user/appdata/nebularr
#
# 1) Create folders before `docker compose up`:
#    mkdir -p /mnt/user/appdata/nebularr/{postgres,runtime,webserver}
#
# 2) First boot: set DATABASE_URL to the Postgres superuser (same user/password as POSTGRES_*).
#    After the Web UI "Database" step (or bootstrap API), Nebularr saves the arrapp URL under
#    .../runtime and overrides DATABASE_URL on the next container start. You may then remove
#    DATABASE_URL from this file if you prefer.
#
# 3) If your base path is NOT /mnt/user/appdata/nebularr, update every host path below the same way.

services:
  postgres:
    image: postgres:16
    container_name: nebularr-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arranalytics}
      POSTGRES_USER: ${POSTGRES_USER:-arradmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arradmin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - /mnt/user/appdata/nebularr/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arradmin} -d ${POSTGRES_DB:-arranalytics}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nebularr

  app:
    image: ${NEBULARR_IMAGE:-dendlomm/nebularr:latest}
    container_name: nebularr
    environment:
      NEBULARR_ENV_FROM_PROCESS_ONLY: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-UTC}
      DATABASE_URL: ${DATABASE_URL:-}
      ENABLE_BOOTSTRAP_MIGRATIONS: ${ENABLE_BOOTSTRAP_MIGRATIONS:-true}
      NEBULARR_RUNTIME_DIR: /app/data
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - /mnt/user/appdata/nebularr/runtime:/app/data
      - /mnt/user/appdata/nebularr/webserver:/var/lib/nebularr
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nebularr

networks:
  nebularr:
    name: nebularr
