name: Release

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE: dendlomm/nebularr

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v6

      - name: Tag matches pyproject.toml version
        id: version
        run: |
          version="$(python3 -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Tag v${tag} does not match pyproject.toml version ${version}" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Version strings in sync
        run: ./scripts/check-version-sync.sh

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend install + test + build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build
      - name: Committed web dist is fresh
        run: git diff --exit-code -- src/arrsync/web/dist

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Backend install + test
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          ruff check src tests
          mypy src
          pytest -q

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image (SBOM + provenance)
        run: |
          docker buildx build \
            --provenance=mode=max --sbom=true \
            -f Dockerfile \
            --build-arg "APP_VERSION=${{ steps.version.outputs.version }}" \
            --build-arg "GIT_SHA=${GITHUB_SHA::7}" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ steps.version.outputs.version }}" \
            --platform linux/amd64,linux/arm64 \
            --push \
            .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Nebularr ${GITHUB_REF_NAME}" \
            --generate-notes
