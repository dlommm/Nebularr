name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node 24 for JS-based actions ahead of GH-hosted default (2026-06-02).
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nebularr
          POSTGRES_PASSWORD: nebularr
          POSTGRES_DB: nebularr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nebularr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend Install
        working-directory: frontend
        run: npm ci
      - name: Frontend Lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend Tests
        working-directory: frontend
        run: npm run test
      - name: Frontend Build
        working-directory: frontend
        run: npm run build
      - name: Committed web dist is fresh
        run: git diff --exit-code -- src/arrsync/web/dist
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest -q
      - name: Integration tests (real Postgres)
        env:
          NEBULARR_TEST_DATABASE_URL: postgresql+psycopg://nebularr:nebularr@localhost:5432/nebularr_test
        run: pytest tests/integration -q

  security:
    runs-on: ubuntu-latest
    # Scanner images are version-pinned (not :latest) so the supply-chain jobs are
    # themselves reproducible; Dependabot's docker ecosystem does not track `docker run`
    # images, so bump these alongside base-image updates.
    env:
      TRIVY_IMAGE: aquasec/trivy:0.72.0
      GRYPE_IMAGE: anchore/grype:v0.115.0
      HADOLINT_IMAGE: hadolint/hadolint:v2.14.0
    steps:
      - uses: actions/checkout@v6
      - name: Hadolint (app Dockerfile)
        run: docker run --rm -i "$HADOLINT_IMAGE" < Dockerfile
      - name: Trivy filesystem + secret + vuln
        run: |
          docker run --rm -v "$PWD:/src" "$TRIVY_IMAGE" fs \
            --scanners vuln,misconfig,secret --severity HIGH,CRITICAL --exit-code 1 /src
      - name: Trivy Dockerfile / compose misconfig
        run: |
          docker run --rm -v "$PWD:/src" "$TRIVY_IMAGE" config \
            --severity HIGH,CRITICAL --exit-code 1 /src
      - name: Docker build (image scan input)
        run: docker build -t nebularr:ci .
      - name: Trivy image (HIGH/CRITICAL)
        run: |
          docker save nebularr:ci -o /tmp/nebularr-ci.tar
          docker run --rm -v "$PWD:/src" -v /tmp:/tmp "$TRIVY_IMAGE" image \
            --input /tmp/nebularr-ci.tar --severity HIGH,CRITICAL --exit-code 1 \
            --ignorefile /src/.trivyignore.image
      - name: Grype image (fixed issues only; avoids unfixed distro noise)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock "$GRYPE_IMAGE" \
            nebularr:ci --only-fixed --fail-on high -o table

  lint_shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Shellcheck scripts and git hooks
        run: |
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:v0.11.0 \
            scripts/*.sh .githooks/commit-msg

  version_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: All hardcoded version strings match pyproject.toml
        run: ./scripts/check-version-sync.sh

  smoke_optional:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend Install
        working-directory: frontend
        run: npm ci
      - name: Install Playwright Browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --build
      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time" >&2
          exit 1
      - name: Smoke script
        run: ./scripts/smoke.sh
      - name: E2E critical flows
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npm run test:e2e
      - name: Tear down stack
        if: always()
        run: docker compose down -v
