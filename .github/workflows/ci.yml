name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Frontend Install
        working-directory: frontend
        run: npm install
      - name: Frontend Lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend Tests
        working-directory: frontend
        run: npm run test
      - name: Frontend Build
        working-directory: frontend
        run: npm run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint (app Dockerfile)
        run: docker run --rm -i hadolint/hadolint < Dockerfile
      - name: Trivy filesystem + secret + vuln
        run: |
          docker run --rm -v "$PWD:/src" aquasec/trivy:latest fs \
            --scanners vuln,misconfig,secret --severity HIGH,CRITICAL --exit-code 1 /src
      - name: Trivy Dockerfile / compose misconfig
        run: |
          docker run --rm -v "$PWD:/src" aquasec/trivy:latest config \
            --severity HIGH,CRITICAL --exit-code 1 /src
      - name: Docker build (image scan input)
        run: docker build -t nebularr:ci .
      - name: Trivy image (HIGH/CRITICAL)
        run: |
          docker save nebularr:ci -o /tmp/nebularr-ci.tar
          docker run --rm -v "$PWD:/src" -v /tmp:/tmp aquasec/trivy:latest image \
            --input /tmp/nebularr-ci.tar --severity HIGH,CRITICAL --exit-code 1 \
            --ignorefile /src/.trivyignore.image
      - name: Grype image (fixed issues only; avoids unfixed distro noise)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock anchore/grype:latest \
            nebularr:ci --only-fixed --fail-on high -o table

  smoke_optional:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Frontend Install
        working-directory: frontend
        run: npm install
      - name: Install Playwright Browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --build
      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time" >&2
          exit 1
      - name: Smoke script
        run: ./scripts/smoke.sh
      - name: E2E critical flows
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npm run test:e2e
      - name: Tear down stack
        if: always()
        run: docker compose down -v
