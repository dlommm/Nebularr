# Default stack: optional bundled Postgres (profile `nebularr-bundled-postgres`) + app (non-root,
# read-only root, caps dropped). Enable the profile in `.env` (`COMPOSE_PROFILES`) or use
# `./scripts/one-click-all-in-one.sh`, which respects `NEBULARR_BUNDLED_POSTGRES`. Omit the profile
# to run app-only against an external Postgres (wizard host must reach that server).
services:
  postgres:
    profiles:
      - nebularr-bundled-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arranalytics}
      POSTGRES_USER: ${POSTGRES_USER:-arradmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arradmin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arradmin} -d ${POSTGRES_DB:-arranalytics}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-1.7.0}
        GIT_SHA: ${APP_GIT_SHA:-release}
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      # App reads only process env inside the container (.env is not copied into the image; see .dockerignore).
      NEBULARR_ENV_FROM_PROCESS_ONLY: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-UTC}
      # Optional: set DATABASE_URL to skip the Web UI database step (e.g. CI). Otherwise the
      # wizard collects Postgres settings and persists the URL under /app/data.
      DATABASE_URL: ${DATABASE_URL:-}
      ENABLE_BOOTSTRAP_MIGRATIONS: ${ENABLE_BOOTSTRAP_MIGRATIONS:-true}
      NEBULARR_RUNTIME_DIR: /app/data
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - nebularr_runtime:/app/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped

volumes:
  postgres_data:
  nebularr_runtime:
